<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #111111;
      overflow: hidden;
    }

    .container {
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 80px;
      position: relative;
    }

    .accent-line {
      width: 48px;
      height: 4px;
      background: #e6ff00;
      margin-bottom: 28px;
      border-radius: 2px;
    }

    .headline {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.035em;
      color: #111111;
      margin-bottom: 20px;
      max-width: 900px;
    }

    .subtext {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.5;
      color: #555555;
      max-width: 720px;
    }

    .logo {
      position: absolute;
      bottom: 40px;
      right: 56px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaaaaa;
      text-transform: uppercase;
    }

    .corner-accent {
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      overflow: hidden;
    }

    .corner-accent::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #e6ff00;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner-accent"></div>
    <div class="accent-line"></div>
    <h1 class="headline">900+ Stars in 48 Hours</h1>
    <p class="subtext">Mike, the open source legal AI, launched and already has 200+ forks and community-built extensions live.</p>
    <div class="logo">Flywheel</div>
  </div>
</body>
</html>
