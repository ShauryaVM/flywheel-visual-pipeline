<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #111111;
      overflow: hidden;
    }

    .container {
      width: 1200px;
      height: 630px;
      display: flex;
      padding: 40px 64px;
      gap: 48px;
      position: relative;
    }

    .left-panel {
      flex: 0 0 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .accent-line {
      width: 40px;
      height: 4px;
      background: #e6ff00;
      margin-bottom: 20px;
      border-radius: 2px;
    }

    .headline {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: #111111;
    }

    .subtext {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      color: #666666;
      margin-top: 14px;
    }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.02);
    }

    .list-item:nth-child(odd) {
      background: rgba(0, 0, 0, 0.035);
    }

    .item-number {
      flex: 0 0 32px;
      height: 32px;
      background: #111111;
      color: #e6ff00;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      margin-top: 1px;
    }

    .item-text {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.45;
      color: #333333;
      flex: 1;
    }

    .logo {
      position: absolute;
      bottom: 28px;
      right: 48px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #aaaaaa;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="accent-line"></div>
      <h1 class="headline">Essential Books for Product Builders</h1>
      <p class="subtext">Curated by jobs-to-be-done. Three books per category, all completed, all high signal.</p>
    </div>
    <div class="right-panel">
      <div class="list-item">
        <div class="item-number">1</div>
        <div class="item-text">3 books per category</div>
      </div>
      <div class="list-item">
        <div class="item-number">2</div>
        <div class="item-text">Organized by jobs-to-be-done</div>
      </div>
      <div class="list-item">
        <div class="item-number">3</div>
        <div class="item-text">Classics and under-the-radar gems</div>
      </div>
      <div class="list-item">
        <div class="item-number">4</div>
        <div class="item-text">Books over 10 years old prioritized</div>
      </div>
      <div class="list-item">
        <div class="item-number">5</div>
        <div class="item-text">Only books the author has completed</div>
      </div>
    </div>
    <div class="logo">Flywheel</div>
  </div>
</body>
</html>
