<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      font-family: &quot;Inter&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif;
      background: #ffffff;
      color: #111111;
      overflow: hidden;
    }

    .canvas {
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 3px 1fr auto;
      position: relative;
    }

    .dot-field {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .warm-bar {
      background: linear-gradient(90deg, #d7c8af 0%, transparent 40%);
      z-index: 1;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      z-index: 1;
    }

    .eyebrow {
      font-family: &quot;DM Mono&quot;,Monaco,Consolas,monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666666;
      margin-bottom: 20px;
    }

    .headline {
      font-size: 52px;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: #000000;
      max-width: 880px;
      margin-bottom: 24px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #d7c8af;
      margin-bottom: 24px;
    }

    .subtext {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.55;
      color: #555555;
      max-width: 680px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px 36px;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand svg { width: 18px; height: 18px; }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #aaaaaa;
      text-transform: uppercase;
    }

    .url {
      font-family: &quot;DM Mono&quot;,Monaco,Consolas,monospace;
      font-size: 12px;
      color: #888888;
    }

    .gradient-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(180deg, transparent 0%, rgba(215, 200, 175, 0.05) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="dot-field">
      <svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
        <circle cx="1000" cy="100" r="5" opacity="0.12" fill="#c0c0c0"/>
        <circle cx="1080" cy="160" r="3" opacity="0.18" fill="#c0c0c0"/>
        <circle cx="940" cy="140" r="4" opacity="0.1" fill="#c0c0c0"/>
        <circle cx="1140" cy="80" r="7" opacity="0.08" fill="#c0c0c0"/>
        <circle cx="1060" cy="220" r="2" opacity="0.2" fill="#c0c0c0"/>
        <circle cx="1100" cy="60" r="3" opacity="0.15" fill="#c0c0c0"/>
        <circle cx="980" cy="50" r="2.5" opacity="0.16" fill="#c0c0c0"/>
        <circle cx="900" cy="200" r="6" opacity="0.07" fill="#c0c0c0"/>
        <circle cx="1050" cy="300" r="3" opacity="0.12" fill="#c0c0c0"/>
        <line x1="1000" y1="100" x2="1080" y2="160" stroke="#c0c0c0" stroke-width="0.5" opacity="0.08"/>
        <line x1="940" y1="140" x2="1000" y2="100" stroke="#c0c0c0" stroke-width="0.5" opacity="0.06"/>
        <line x1="1060" y1="220" x2="1080" y2="160" stroke="#c0c0c0" stroke-width="0.5" opacity="0.08"/>
      </svg>
    </div>
    <div class="warm-bar"></div>
    <div class="content">
      <div class="eyebrow">Flywheel Insights</div>
      <h1 class="headline">Read what survives a decade</h1>
      <div class="divider"></div>
      <p class="subtext">A curated reading list for product builders, organized by the development area you are working on right now.</p>
    </div>
    <div class="footer">
      <div class="brand">
        <svg viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg"><path d="M 4.448 1.186 C 9.412 -1.598 16.505 0.685 20.293 6.29 C 24.08 11.895 23.127 18.694 18.165 21.479 C 22.385 19.113 23.194 13.33 19.975 8.567 C 16.755 3.805 10.723 1.862 6.506 4.229 C 2.286 6.598 1.477 12.377 4.694 17.142 C 7.914 21.905 13.942 23.848 18.162 21.479 C 13.197 24.266 6.104 21.98 2.317 16.375 C -1.468 10.773 -0.515 3.971 4.447 1.186 Z" fill="#aaaaaa" opacity="0.5"/></svg>
        <span class="brand-name">Flywheel</span>
      </div>
      <span class="url">flywheelos.com</span>
    </div>
    <div class="gradient-footer"></div>
  </div>
</body>
</html>
